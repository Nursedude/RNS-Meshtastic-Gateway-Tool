name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check src/ launcher.py scripts/

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.11']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        id: pytest
        run: |
          set -o pipefail
          pytest tests/ -v --tb=short --timeout=30 -x --cov=src --cov-report=term-missing 2>&1 | tee /tmp/pytest.log
        env:
          CI: true

      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log-py${{ matrix.python-version }}
          path: /tmp/pytest.log
          if-no-files-found: ignore

      - name: Post pytest failure summary to PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = '/tmp/pytest.log';
            if (!fs.existsSync(path)) {
              core.warning('pytest log not found at ' + path);
              return;
            }
            const log = fs.readFileSync(path, 'utf8');
            const lines = log.split('\n');
            const failureIdx = lines.findIndex(l => /=+ FAILURES =+/.test(l));
            const summaryIdx = lines.findIndex(l => /=+ short test summary info =+/.test(l));
            let excerpt;
            if (summaryIdx !== -1) {
              excerpt = lines.slice(summaryIdx).join('\n');
            } else if (failureIdx !== -1) {
              excerpt = lines.slice(failureIdx).join('\n');
            } else {
              excerpt = lines.slice(-120).join('\n');
            }
            const maxLen = 60000;
            if (excerpt.length > maxLen) {
              excerpt = excerpt.slice(-maxLen);
            }
            const body = [
              '### pytest failure (Python ${{ matrix.python-version }})',
              '',
              'Job: `${{ github.job }}` — run [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})',
              '',
              '<details><summary>pytest summary</summary>',
              '',
              '```',
              excerpt,
              '```',
              '',
              '</details>',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

  syntax-check:
    name: Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check Python syntax
        run: |
          python -m py_compile launcher.py
          python -m py_compile version.py
          python -m py_compile scripts/broadcast.py
          find src -name "*.py" -type f -exec python -m py_compile {} \;
          echo "All syntax checks passed"

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for shell=True violations
        run: |
          VIOLATIONS=$(grep -rn "subprocess\.\(run\|Popen\|call\).*shell\s*=\s*True" src/ scripts/ launcher.py --include="*.py" 2>/dev/null || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "ERROR: Found shell=True in subprocess calls:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "No shell=True violations found"

      - name: Check for hardcoded secrets
        run: |
          if grep -rn "password\s*=\s*['\"][^'\"]\+" src/ --include="*.py" | grep -v "#" | head -5; then
            echo "Warning: Potential hardcoded passwords found"
          fi
          echo "Security scan complete"

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies and pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit

      - name: Run pip-audit
        run: pip-audit
